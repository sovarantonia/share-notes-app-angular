<mat-tab-group>
  <mat-tab label="Friends">
    <app-friends-card
      [items$]="friendsItems$"
      [mode]="'friends'"
      (removeFriend)="deleteFriend($event)"
    />
  </mat-tab>
  <mat-tab label="Requests">
    <app-friends-card
      [items$]="receivedRequestItems$"
      [mode]="'received'"
      (acceptRequest)="acceptRequest($event)"
      (declineRequest)="declineRequest($event)"
    />
  </mat-tab>
  <mat-tab label="Sent">
    <app-friends-card
      [items$]="sentRequestItems$"
      [mode]="'sent'"
      (cancelRequest)="deleteRequest($event)"
    />
  </mat-tab>
</mat-tab-group>
