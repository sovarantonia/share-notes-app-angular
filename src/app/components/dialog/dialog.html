<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content> {{ data.content }}</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>{{ data.dialogCloseActionName }}</button>
  <button matButton [mat-dialog-close]="true">{{ data.actionName }}</button>
</mat-dialog-actions>
