<h2 mat-dialog-title>View note</h2>
<mat-dialog-content>
  @if (!data.isReadonlyMode) {
    <app-note-form [note]="data.note" (formSubmitted)="onDialogSubmit($event)" />
  } @else {
    <mat-label>{{ data.note.title }}</mat-label>
    <mat-chip>{{ data.note.date }}</mat-chip>
    {{ data.note.text }}
  }
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton mat-dialog-close>Close</button>
</mat-dialog-actions>
