<section>
  <h1>Weekly chart</h1>
</section>

<section>
  <h1>Latest notes</h1>
  @if (latestNotes$ | async; as latestNotes) {
    @for (note of latestNotes; track note.id) {
      <h2>{{note.title}}</h2>
      <p>{{note.text}}</p>
      <p>{{note.date}}</p>
      <p>{{note.grade}}</p>
      <div>
        <p>Tags:</p>
        @for (tag of note.tags; track tag.id) {
            <p>{{tag.name}}</p>
        }
      </div>
    }
  }
</section>
