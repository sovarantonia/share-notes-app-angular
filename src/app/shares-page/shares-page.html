<mat-tab-group>
  <mat-tab label="Received">
    @if (receivedNotes$ | async; as receivedNotes) {
      @for (share of receivedNotes; track share.id) {
        <app-share-card [share]="share" />
      }
    }
  </mat-tab>
  <mat-tab label="Sent">
    @if (sentNotes$ | async; as sentNotes) {
      @for (share of sentNotes; track share.id) {
        <app-share-card [share]="share" [isReceived]="false" />
      }
    }
  </mat-tab>
</mat-tab-group>
